name: 🚀 Minecraft Infrastructure CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 🔨 Сборка и тестирование
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [21]
        maven-version: [3.9.6]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: ☕ Set up Java ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        
    - name: 📦 Set up Maven ${{ matrix.maven-version }}
      uses: actions/setup-maven@v4
      with:
        maven-version: ${{ matrix.maven-version }}
        
    - name: 🔍 Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: 🧪 Run tests
      run: |
        cd plugin/purpur-plugin
        mvn test
        
    - name: 🔨 Build plugin
      run: |
        cd plugin/purpur-plugin
        mvn clean package
        
    - name: 📦 Build Docker images
      run: |
        # Build auth-bridge
        docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-bridge:${{ github.sha }} ./services/auth-bridge
        docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/economy-api:${{ github.sha }} ./services/economy-api
        
        # Build plugin image
        docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/purpur-plugin:${{ github.sha }} -f plugin/Dockerfile .
        
    - name: 🚀 Push Docker images
      run: |
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-bridge:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/economy-api:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/purpur-plugin:${{ github.sha }}
        
        # Tag with latest for main branch
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-bridge:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-bridge:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/economy-api:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/economy-api:latest
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/purpur-plugin:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/purpur-plugin:latest
          
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-bridge:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/economy-api:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/purpur-plugin:latest
        fi

  # 🧪 Развертывание на тестовый сервер
  deploy-test:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔐 Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
        
    - name: 🔑 Configure kubectl for test cluster
      run: |
        echo "${{ secrets.TEST_KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        
    - name: 🚀 Deploy to test environment
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update Helm charts with test image tags
        sed -i 's|ghcr.io/.*/auth-bridge|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-bridge:${{ github.sha }}|g' helm/auth-bridge/values.yaml
        sed -i 's|ghcr.io/.*/economy-api|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/economy-api:${{ github.sha }}|g' helm/economy-api/values.yaml
        
        # Deploy to test namespace
        kubectl create namespace minecraft-test --dry-run=client -o yaml | kubectl apply -f -
        
        # Deploy services
        helm upgrade --install auth-bridge-test ./helm/auth-bridge -n minecraft-test --set environment=test
        helm upgrade --install economy-api-test ./helm/economy-api -n minecraft-test --set environment=test
        helm upgrade --install purpur-test ./helm/purpur-shard -n minecraft-test --set environment=test
        
    - name: 🧪 Run integration tests
      run: |
        export KUBECONFIG=kubeconfig
        
        # Wait for services to be ready
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=auth-bridge -n minecraft-test --timeout=300s
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=economy-api -n minecraft-test --timeout=300s
        
        # Run basic health checks
        kubectl get pods -n minecraft-test
        kubectl get services -n minecraft-test

  # 🚀 Развертывание на продакшн
  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔐 Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
        
    - name: 🔑 Configure kubectl for production cluster
      run: |
        echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        
    - name: 🚀 Deploy to production
      run: |
        export KUBECONFIG=kubeconfig
        
        # Update Helm charts with production image tags
        sed -i 's|ghcr.io/.*/auth-bridge|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-bridge:${{ github.sha }}|g' helm/auth-bridge/values.yaml
        sed -i 's|ghcr.io/.*/economy-api|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/economy-api:${{ github.sha }}|g' helm/economy-api/values.yaml
        
        # Deploy to production namespace
        kubectl create namespace minecraft --dry-run=client -o yaml | kubectl apply -f -
        
        # Deploy using our deploy script
        chmod +x deploy.sh
        ./deploy.sh
        
    - name: 🔍 Verify deployment
      run: |
        export KUBECONFIG=kubeconfig
        
        # Wait for all services to be ready
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=auth-bridge -n minecraft --timeout=300s
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=economy-api -n minecraft --timeout=300s
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=purpur-shard -n minecraft --timeout=300s
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=velocity -n minecraft --timeout=300s
        
        # Show final status
        kubectl get pods -n minecraft
        kubectl get services -n minecraft

  # 📊 Уведомления
  notify:
    needs: [deploy-test, deploy-production]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 📧 Notify on success
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: '🎉 Minecraft Infrastructure успешно развернута!'
        channel: '#minecraft-deployments'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        
    - name: 📧 Notify on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: '❌ Ошибка развертывания Minecraft Infrastructure!'
        channel: '#minecraft-deployments'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}



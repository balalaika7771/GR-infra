name: Deploy infrastructure

on:
  push:
    branches: [ "main" ]
    paths:
      - '**'
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - cleanup

concurrency:
  group: infra-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload repo to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "."
          target: "/opt/infra"

      - name: Run deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            export KUBECONFIG=/etc/kubernetes/admin.conf
            
            # Переходим в директорию с инфраструктурой
            cd /opt/infra
            
            # Устанавливаем права на выполнение для скриптов
            chmod +x deploy.sh || true
            chmod +x repo/deploy.sh || true
            
            # Устанавливаем необходимые зависимости если их нет
            if ! command -v kubectl &> /dev/null; then
              echo "Installing kubectl..."
              curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x kubectl
              sudo mv kubectl /usr/local/bin/
            fi
            
            if ! command -v helm &> /dev/null; then
              echo "Installing helm..."
              curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
            fi
            
            if ! command -v docker &> /dev/null; then
              echo "Installing docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sh get-docker.sh
              sudo usermod -aG docker $USER
            fi
            
            # Настраиваем Docker daemon для работы с внутренним registry
            echo "Configuring Docker daemon for internal registry..."
            sudo mkdir -p /etc/docker
            sudo tee /etc/docker/daemon.json > /dev/null <<'EOF'
{
  "insecure-registries": ["registry:5000"],
  "dns": ["10.96.0.10", "8.8.8.8", "8.8.4.4"]
}
EOF
            sudo systemctl restart docker || true
            sleep 5
            
            # Запускаем соответствующий скрипт в зависимости от действия
            if [ "${{ github.event.inputs.action }}" = "cleanup" ]; then
              echo "Running cleanup..."
              if [ -f ./deploy.sh ]; then 
                ./deploy.sh --cleanup
              else 
                ./repo/deploy.sh --cleanup
              fi
            else
              echo "Running deployment..."
              if [ -f ./deploy.sh ]; then 
                ./deploy.sh
              else 
                ./repo/deploy.sh
              fi
            fi
            
            echo "Deployment completed successfully!"



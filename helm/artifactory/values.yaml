artifactory:
  name: artifactory
  image:
    repository: nginx
    tag: "alpine"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP  # Только внутренний доступ
    port: 80        # Nginx HTTP port
  
  ingress:
    enabled: false
  
  persistence:
    enabled: false  # Временно отключено для использования emptyDir
    size: 10Gi
    storageClass: ""
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Allow scheduling on single-node clusters (tainted control-plane/master)
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"

  # Optional: force schedule on control-plane node
  nodeSelector: {}
  
  # Настройки для Minecraft плагинов
  plugins:
    repositories:
      - name: minecraft-plugins
        type: maven
        description: "Minecraft plugins repository"
      - name: economy-api
        type: maven
        description: "Economy API service"
  
  # Начальные настройки
  config:
    admin:
      password: "admin123"
    repositories:
      minecraft-plugins:
        type: maven
        description: "Minecraft plugins repository"
        url: "http://artifactory:8081/artifactory/minecraft-plugins"  # Изменено на http
      economy-api:
        type: maven
        description: "Economy API service"
        url: "http://artifactory:8081/artifactory/economy-api"  # Изменено на http

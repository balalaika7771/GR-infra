image:
  repository: economy-api
  tag: latest
  pullPolicy: Never

replicas: 1

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "50m"      # Native image требует меньше CPU
    memory: "128Mi" # Native image требует значительно меньше памяти
  limits:
    cpu: "100m"
    memory: "256Mi" # Native image использует ~50-100MB памяти

env:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/economy_api"
  SPRING_DATASOURCE_USERNAME: "minecraft"
  SPRING_DATASOURCE_PASSWORD: "minecraft123"
  SPRING_REDIS_HOST: "redis"
  SPRING_REDIS_PORT: "6379"

# Окружение (test/production)
environment: "production"

# Настройки для разных окружений
environments:
  test:
    replicas: 1
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  production:
    replicas: 1
    resources:
      requests:
        cpu: "100m"     # Native image эффективнее
        memory: "256Mi" # Native image использует меньше памяти
      limits:
        cpu: "200m"
        memory: "512Mi" # Native image редко превышает 200MB

# Allow scheduling on single-node control-plane
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"

nodeSelector: {}

image:
  repository: postgres
  tag: "15"
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: ClusterIP
  port: 5432

persistence:
  enabled: false  # Временно отключено для использования emptyDir
  size: 5Gi
  storageClass: ""

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

env:
  POSTGRES_DB: minecraft
  POSTGRES_USER: minecraft
  POSTGRES_PASSWORD: minecraft123

initScripts:
  - |
    CREATE DATABASE auth_bridge;
    CREATE DATABASE economy_api;

# Allow scheduling on single-node control-plane
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"

nodeSelector: {}



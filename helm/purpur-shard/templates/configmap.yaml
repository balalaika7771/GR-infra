apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "purpur-shard.fullname" . }}-config
  labels:
    {{- include "purpur-shard.labels" . | nindent 4 }}
data:
  paper-global.yml: |
    # Paper Global Configuration
    proxies:
      velocity:
        enabled: true
        online-mode: false
        secret: "minecraft-secret-key"
  
  spigot.yml: |
    # Spigot Configuration
    settings:
      bungeecord: false

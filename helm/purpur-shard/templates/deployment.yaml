apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "purpur-shard.fullname" . }}
  labels:
    {{- include "purpur-shard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "purpur-shard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "purpur-shard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}

    spec:
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: false
        fsGroup: 10001
      initContainers:
        - name: config-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["/bin/sh"]
          args:
            - -c
            - |
              mkdir -p /data/config
              cp /config/paper-global.yml /data/config/paper-global.yml
              cp /config/spigot.yml /data/spigot.yml
              echo "velocity-support=true" >> /data/server.properties
              echo "velocity-secret=minecraft-secret-key" >> /data/server.properties
              echo "online-mode=false" >> /data/server.properties
          volumeMounts:
            - name: world
              mountPath: /data
            - name: config
              mountPath: /config
            - name: plugins-config
              mountPath: /plugins-config
        - name: plugins-init
          image: alpine:3.19
          command: ["/bin/sh"]
          args:
            - -c
            - |
              echo "Инициализация плагинов для Purpur..."



              # Создаем директорию для плагинов
              mkdir -p /data/plugins

              # Читаем конфигурацию плагинов
              PLUGINS_CONFIG="/plugins-config/plugins.yaml"
              if [ ! -f "$PLUGINS_CONFIG" ]; then
                echo "Ошибка: plugins.yaml не найден"
                exit 1
              fi


              echo "Загружаем purpur-plugin из Artifactory..."
              wget -q -O "/data/plugins/purpur-plugin.jar" "http://artifactory/minecraft-plugins/com/example/purpur-plugin/1.0.0/purpur-plugin-1.0.0.jar"
              if [ $? -eq 0 ] && [ -s "/data/plugins/purpur-plugin.jar" ]; then
                echo "✓ purpur-plugin загружен"
              else
                echo "✗ Ошибка загрузки purpur-plugin"
                exit 1
              fi
              
              echo "Загружаем gr-core-plugin из Artifactory..."
              wget -q -O "/data/plugins/gr-core-plugin.jar" "http://artifactory/minecraft-plugins/org/owleebr/gr-core-plugin/1.0.0/gr-core-plugin-1.0.0.jar"
              if [ $? -eq 0 ] && [ -s "/data/plugins/gr-core-plugin.jar" ]; then
                echo "✓ gr-core-plugin загружен"
              else
                echo "✗ Ошибка загрузки gr-core-plugin"
                exit 1
              fi
              
              echo "Загружаем gr-player-plugin из Artifactory..."
              wget -q -O "/data/plugins/gr-player-plugin.jar" "http://artifactory/minecraft-plugins/org/owleebr/gr-player-plugin/1.0.0/gr-player-plugin-1.0.0.jar"
              if [ $? -eq 0 ] && [ -s "/data/plugins/gr-player-plugin.jar" ]; then
                echo "✓ gr-player-plugin загружен"
              else
                echo "✗ Ошибка загрузки gr-player-plugin"
                exit 1
              fi
              
              echo "Загружаем gr-race-plugin из Artifactory..."
              wget -q -O "/data/plugins/gr-race-plugin.jar" "http://artifactory/minecraft-plugins/org/owleebr/gr-race-plugin/1.0.0/gr-race-plugin-1.0.0.jar"
              if [ $? -eq 0 ] && [ -s "/data/plugins/gr-race-plugin.jar" ]; then
                echo "✓ gr-race-plugin загружен"
              else
                echo "✗ Ошибка загрузки gr-race-plugin"
                exit 1
              fi
              
              echo "Загружаем ProtocolLib..."
              wget -q -O "/data/plugins/ProtocolLib.jar" "https://github.com/dmulloy2/ProtocolLib/releases/download/5.4.0/ProtocolLib.jar"
              if [ $? -eq 0 ] && [ -s "/data/plugins/ProtocolLib.jar" ]; then
                echo "✓ ProtocolLib загружен"
              else
                echo "✗ Ошибка загрузки ProtocolLib"
                exit 1
              fi

              # Диагностика
              echo "Проверяем загруженные плагины:"
              ls -la /data/plugins/ || true
          volumeMounts:
            - name: world
              mountPath: /data
            - name: config
              mountPath: /config
            - name: plugins-config
              mountPath: /plugins-config
      containers:
        - name: purpur
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "{{ .Values.jvm.opts }}"
            - name: FORWARDING_SECRET
              value: "minecraft-secret-key"
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "PURPUR"
            - name: VERSION
              value: "{{ .Values.version }}"
            - name: ONLINE_MODE
              value: "{{ .Values.server.onlineMode | default false }}"
            - name: VELOCITY_SECRET
              value: "{{ .Values.server.velocity.secret }}"
          ports:
            - name: mc
              containerPort: 25565
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
          volumeMounts:
            - name: world
              mountPath: /data
            - name: config
              mountPath: /config

          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Получен сигнал остановки, сохраняем мир..."
                    # Отправляем команду save-all
                    echo "save-all" | nc -w 5 localhost 25565 || true
                    # Ждем немного для сохранения
                    sleep 5
                    # Отправляем команду stop
                    echo "stop" | nc -w 5 localhost 25565 || true
                    # Ждем завершения
                    sleep 10
                    echo "Minecraft сервер остановлен"

          readinessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: world
          {{- if .Values.persistence.enabled }}
          {{- if .Values.persistence.shared }}
          persistentVolumeClaim:
            claimName: {{ include "purpur-shard.fullname" . }}-shared-world
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "purpur-shard.fullname" . }}-world
          {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "purpur-shard.fullname" . }}-config
        - name: plugins-config
          configMap:
            name: {{ include "purpur-shard.fullname" . }}-plugins



apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "purpur-shard.fullname" . }}
  labels:
    {{- include "purpur-shard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "purpur-shard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "purpur-shard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}

    spec:
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: false
        fsGroup: 10001
      initContainers:
        - name: config-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["/bin/sh"]
          args:
            - -c
            - |
              mkdir -p /data/config
              cp /config/paper-global.yml /data/config/paper-global.yml
              cp /config/spigot.yml /data/spigot.yml
              echo "velocity-support=true" >> /data/server.properties
              echo "velocity-secret=minecraft-secret-key" >> /data/server.properties
              echo "online-mode=false" >> /data/server.properties
          volumeMounts:
            - name: world
              mountPath: /data
            - name: config
              mountPath: /config
            - name: plugins-config
              mountPath: /plugins-config
        - name: plugins-init
          image: alpine:3.19
          command: ["/bin/sh"]
          args:
            - -c
            - |
              set -e
              echo "Инициализация плагинов из plugins.yaml..."
              apk add --no-cache curl wget yq >/dev/null 2>&1 || true
              mkdir -p /data/plugins
              PLUGINS_CONFIG="/plugins-config/plugins.yaml"
              if [ ! -f "$PLUGINS_CONFIG" ]; then
                echo "Ошибка: plugins.yaml не найден"; exit 1
              fi
              download() {
                URL="$1"; OUT="$2"
                echo "→ $URL"
                wget -q -O "$OUT" "$URL" || { echo "✗ Ошибка: $URL"; exit 1; }
                [ -s "$OUT" ] || { echo "✗ Пустой файл: $OUT"; exit 1; }
                echo "✓ $OUT"
              }
              COUNT=$(yq '.plugins | length' "$PLUGINS_CONFIG")
              i=0
              while [ "$i" -lt "$COUNT" ]; do
                NAME=$(yq -r ".plugins[$i].name" "$PLUGINS_CONFIG")
                SRC=$(yq -r ".plugins[$i].source" "$PLUGINS_CONFIG")
                if [ "$SRC" = "artifactory" ]; then
                  REPO=$(yq -r ".plugins[$i].repository" "$PLUGINS_CONFIG")
                  GROUP=$(yq -r ".plugins[$i].groupId" "$PLUGINS_CONFIG")
                  ART=$(yq -r ".plugins[$i].artifactId" "$PLUGINS_CONFIG")
                  VER=$(yq -r ".plugins[$i].version" "$PLUGINS_CONFIG")
                  GP=$(echo "$GROUP" | tr '.' '/')
                  URL="http://artifactory/$REPO/$GP/$ART/$VER/$ART-$VER.jar"
                  OUT="/data/plugins/${ART}.jar"
                  download "$URL" "$OUT"
                elif [ "$SRC" = "url" ]; then
                  URL=$(yq -r ".plugins[$i].url" "$PLUGINS_CONFIG")
                  BASENAME=$(basename "$URL")
                  OUT="/data/plugins/${NAME:-$BASENAME}"
                  download "$URL" "$OUT"
                else
                  echo "Пропуск неизвестного source: $SRC"
                fi
                i=$((i+1))
              done
              echo "Плагины в /data/plugins:"
              ls -la /data/plugins || true
          volumeMounts:
            - name: world
              mountPath: /data
            - name: config
              mountPath: /config
            - name: plugins-config
              mountPath: /plugins-config
      containers:
        - name: purpur
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "{{ .Values.jvm.opts }}"
            - name: FORWARDING_SECRET
              value: "minecraft-secret-key"
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: "PURPUR"
            - name: VERSION
              value: "{{ .Values.version }}"
            - name: ONLINE_MODE
              value: "{{ .Values.server.onlineMode | default false }}"
            - name: VELOCITY_SECRET
              value: "{{ .Values.server.velocity.secret }}"
          ports:
            - name: mc
              containerPort: 25565
              protocol: TCP
            - name: health
              containerPort: {{ .Values.health.port }}
              protocol: TCP
          volumeMounts:
            - name: world
              mountPath: /data
            - name: config
              mountPath: /config

          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Получен сигнал остановки, сохраняем мир..."
                    # Отправляем команду save-all
                    echo "save-all" | nc -w 5 localhost 25565 || true
                    # Ждем немного для сохранения
                    sleep 5
                    # Отправляем команду stop
                    echo "stop" | nc -w 5 localhost 25565 || true
                    # Ждем завершения
                    sleep 10
                    echo "Minecraft сервер остановлен"

          readinessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: world
          {{- if .Values.persistence.enabled }}
          {{- if .Values.persistence.shared }}
          persistentVolumeClaim:
            claimName: {{ include "purpur-shard.fullname" . }}-shared-world
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "purpur-shard.fullname" . }}-world
          {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "purpur-shard.fullname" . }}-config
        - name: plugins-config
          configMap:
            name: {{ include "purpur-shard.fullname" . }}-plugins



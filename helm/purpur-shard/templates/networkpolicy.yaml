apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "purpur-shard.fullname" . }}-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "purpur-shard.name" . }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 25565
        - protocol: TCP
          port: {{ .Values.health.port }}



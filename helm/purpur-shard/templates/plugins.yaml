apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "purpur-shard.fullname" . }}-plugins
  labels:
    {{- include "purpur-shard.labels" . | nindent 4 }}
data:
  plugins.yaml: |
    # Конфигурация плагинов для Purpur шарда
    plugins:
      # Наши собственные плагины
      - name: "purpur-plugin"
        version: "1.0.0"
        source: "artifactory"
        repository: "minecraft-plugins"
        groupId: "com.example"
        artifactId: "purpur-plugin"
        
      # GR плагины
      - name: "gr-core-plugin"
        version: "1.0.0"
        source: "artifactory"
        repository: "minecraft-plugins"
        groupId: "org.owleebr"
        artifactId: "gr-core-plugin"
        
      # - name: "gr-player-plugin"
      #   version: "1.0.0"
      #   source: "artifactory"
      #   repository: "minecraft-plugins"
      #   groupId: "org.owleebr"
      #   artifactId: "gr-player-plugin"
        
      # - name: "gr-race-plugin"
      #   version: "1.0.0"
      #   source: "artifactory"
      #   repository: "minecraft-plugins"
      #   groupId: "org.owleebr"
      #   artifactId: "gr-race-plugin"
        
      # Внешние плагины
      - name: "ProtocolLib"
        version: "5.4.0"
        source: "url"
        url: "https://github.com/dmulloy2/ProtocolLib/releases/download/5.4.0/ProtocolLib.jar"
        
      # Дополнительные плагины можно добавить здесь
      # - name: "WorldEdit"
      #   version: "7.2.12"
      #   source: "artifactory"
      #   repository: "minecraft-plugins"
      #   groupId: "com.sk89q"
      #   artifactId: "worldedit-bukkit"

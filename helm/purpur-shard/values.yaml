image:
  repository: josxha/minecraft-purpur
  tag: 1.21.5
  pullPolicy: IfNotPresent

version: "1.21.5"

replicas: 1

service:
  type: ClusterIP
  port: 25565
  headless: true

jvm:
  opts: "-Xms1g -Xmx3g -XX:+UseG1GC -XX:MaxGCPauseMillis=75 -Dfile.encoding=UTF-8"

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "1"
    memory: "4Gi"

health:
  port: 8080

velocity:
  forwardingSecret: "minecraft-secret-key"
  allowedNamespaceLabel: "app.kubernetes.io/name=velocity"

server:
  onlineMode: false
  velocity:
    enabled: true
    secret: "minecraft-secret-key"
    forwardingMode: "modern"

persistence:
  enabled: true
  size: 10Gi
  storageClass: "hostpath"
  shared: true

plugin:
  enabled: false
  name: "purpur-plugin-1.0.0.jar"
  config:

    economy:
      url: "http://economy-api:8080"
      timeout: 5000
    redis:
      host: "redis"
      port: 6379
      timeout: 5000


image:
  repository: redis
  tag: "7-alpine"
  pullPolicy: IfNotPresent

replicas: 1

service:
  type: ClusterIP
  port: 6379

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

redis:
  password: ""
  port: 6379



apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "velocity.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "velocity.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  velocity.toml: |
{{ .Values.config.velocityToml | indent 4 }}
  forwarding.secret: "{{ .Values.config.forwardingSecret }}"


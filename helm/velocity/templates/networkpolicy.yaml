apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "velocity.fullname" . }}-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "velocity.name" . }}
  policyTypes: [Ingress]
  ingress:
    - from: []  # внешний трафик через Service L4
      ports:
        - protocol: TCP
          port: 25565



apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: economy-api-authz
  namespace: minecraft
spec:
  selector:
    matchLabels:
      app: economy-api
  rules:
  # Разрешаем доступ к health check и тестовым эндпоинтам
  - from:
    - source:
        principals: ["cluster.local/ns/minecraft/sa/default"]
    to:
    - operation:
        methods: ["GET"]
        paths: ["/actuator/health", "/api/purchases/health"]
  
  # Разрешаем доступ к тестовым эндпоинтам только из внутренней сети
  - from:
    - source:
        namespaces: ["minecraft"]
    to:
    - operation:
        methods: ["GET", "POST"]
        paths: ["/api/test/*", "/api/purchases/test-*"]
  
  # Основные API эндпоинты требуют аутентификации
  - from:
    - source:
        requestPrincipals: ["*"]
    to:
    - operation:
        methods: ["GET", "POST"]
        paths: ["/api/purchases/*"]
  
  # Swagger UI и API docs доступны всем
  - to:
    - operation:
        methods: ["GET"]
        paths: ["/swagger-ui/*", "/v3/api-docs/*"]
  
  # По умолчанию запрещаем все остальное
  - {}

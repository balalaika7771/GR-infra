apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: economy-api-network-policy
  namespace: minecraft
spec:
  podSelector:
    matchLabels:
      app: economy-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Разрешаем доступ только из Istio ingress gateway
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    - podSelector:
        matchLabels:
          app: istio-ingressgateway
  egress:
  # Разрешаем исходящие соединения к базе данных
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Разрешаем исходящие соединения к Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379

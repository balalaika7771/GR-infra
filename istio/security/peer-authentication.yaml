apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: minecraft
spec:
  mtls:
    mode: STRICT  # Требуем mTLS для всех сервисов
  portLevelMtls:
    8080:  # HTTP порт для health checks
      mode: PERMISSIVE  # Разрешаем как mTLS, так и plain text
    25565:  # Minecraft порт
      mode: PERMISSIVE  # Разрешаем как mTLS, так и plain text
  selector:
    matchLabels:
      app: minecraft  # Применяем ко всем подам в namespace minecraft

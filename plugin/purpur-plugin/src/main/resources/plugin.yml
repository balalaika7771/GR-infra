name: EconomyPlugin
version: 1.0.0
main: com.example.mcplugin.MainPlugin
api-version: 1.21
description: Упрощенный плагин экономики с Redis кэшированием

commands:
  balance:
    description: Показать баланс кошелька
    usage: /balance
    permission: economy.balance
  transfer:
    description: Перевести деньги другому игроку
    usage: /transfer <игрок> <сумма> [описание]
    permission: economy.transfer

permissions:
  economy.balance:
    description: Разрешает использовать команду /balance
    default: true
  economy.transfer:
    description: Разрешает использовать команду /transfer
    default: true

name: EconomyPlugin
version: 1.0.0
main: com.example.mcplugin.MainPlugin
api-version: 1.20
description: Упрощенный плагин экономики с Redis кэшированием

commands:
  balance:
    description: Показать баланс кошелька
    usage: /balance
    permission: economy.balance

permissions:
  economy.balance:
    description: Разрешает использовать команду /balance
    default: true

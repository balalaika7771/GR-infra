server:
  port: 8080

spring:
  application:
    name: economy-api
  
  datasource:
    url: jdbc:postgresql://postgres:5432/economy_api
    username: ${SPRING_DATASOURCE_USERNAME:minecraft}
    password: ${SPRING_DATASOURCE_PASSWORD:minecraft123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: redis
      port: 6379
  
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    contexts: ${SPRING_PROFILES_ACTIVE:default}
  
  # Безопасность управляется Spring Security

logging:
  level:
    com.example.economy: DEBUG
    org.springframework.security: DEBUG
    liquibase: INFO
